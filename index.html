<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trigger Call App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        /* Updated: Allow vertical scrolling so the Arm button isn't cut off */
        body, html { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; min-height: 100%; overflow-y: auto; }
        #app { padding: 20px; }
        .section { margin-bottom: 20px; }
        .controls { display: flex; align-items: center; gap: 10px; margin-top: 5px; }
        button { padding: 15px 25px; font-size: 18px; border-radius: 8px; border: none; background: #333; color: #fff; cursor: pointer; }
        #blackScreen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; z-index: 50; }
        #disarmOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 60; justify-content: center; align-items: center; }
        #fakeCall { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; color: #fff; display: none; z-index: 100; text-align: center; padding-top: 100px; }
    </style>
</head>
<body>

<div id="app">
    <h2>Trigger Call</h2>
    
    <div class="section">
        <h3>Rotation Timer</h3>
        <div class="controls">
            <button onclick="adjustTimer('rotation', -10)">-</button>
            <span id="rotationTime">5</span>s
            <button onclick="adjustTimer('rotation', 10)">+</button>
        </div>
    </div>

    <div class="section">
        <h3>Shake Timer</h3>
        <div class="controls">
            <button onclick="adjustTimer('shake', -10)">-</button>
            <span id="shakeTime">5</span>s
            <button onclick="adjustTimer('shake', 10)">+</button>
        </div>
    </div>

    <div class="section">
        <h3>Shake Sensitivity</h3>
        <div class="controls">
            <button onclick="adjustSensitivity(-1)">-</button>
            <span id="shakeSensitivity">10</span>
            <button onclick="adjustSensitivity(1)">+</button>
        </div>
    </div>

    <div class="section">
        <h3>Vibration Intensity (ms)</h3>
        <div class="controls">
            <button onclick="adjustVibration(-25)">-</button>
            <span id="vibrationIntensity">75</span>ms
            <button onclick="adjustVibration(25)">+</button>
        </div>
    </div>

    <button id="armBtn" onclick="toggleArm()">Arm</button>
    <div id="status">Status: Idle</div>
</div>

<div id="blackScreen"></div>
<div id="disarmOverlay"><button onclick="disarm()">Disarm</button></div>
<div id="fakeCall">
    <h1>Incoming Call...</h1>
    <button onclick="disarm()">Answer</button>
</div>

<audio id="ringtone" loop><source src="ringtone.mp3" type="audio/mpeg"></audio>

<script>
    let state = "idle";
    let wakeLock = null;
    let rotationSeconds = 5, shakeSeconds = 5, shakeThreshold = 10, vibrationIntensity = 75, rotationThreshold = 45;
    let lastOrientation = null, timerRef = null;

    // Load Settings
    window.onload = () => {
        rotationSeconds = parseInt(localStorage.getItem('rotationSeconds')) || 5;
        shakeSeconds = parseInt(localStorage.getItem('shakeSeconds')) || 5;
        shakeThreshold = parseInt(localStorage.getItem('shakeThreshold')) || 10;
        vibrationIntensity = parseInt(localStorage.getItem('vibrationIntensity')) || 75;
        
        document.getElementById('rotationTime').innerText = rotationSeconds;
        document.getElementById('shakeTime').innerText = shakeSeconds;
        document.getElementById('shakeSensitivity').innerText = shakeThreshold;
        document.getElementById('vibrationIntensity').innerText = vibrationIntensity;
    };

    function saveSettings() {
        localStorage.setItem('rotationSeconds', rotationSeconds);
        localStorage.setItem('shakeSeconds', shakeSeconds);
        localStorage.setItem('shakeThreshold', shakeThreshold);
        localStorage.setItem('vibrationIntensity', vibrationIntensity);
    }

    function setStatus(text) { document.getElementById('status').innerText = "Status: " + text; }

    function adjustTimer(type, delta) {
        if (type === 'rotation') { rotationSeconds = Math.max(0, rotationSeconds + delta); document.getElementById('rotationTime').innerText = rotationSeconds; }
        else { shakeSeconds = Math.max(0, shakeSeconds + delta); document.getElementById('shakeTime').innerText = shakeSeconds; }
        saveSettings();
    }

    function adjustSensitivity(delta) { 
        shakeThreshold = Math.max(1, shakeThreshold + delta); 
        document.getElementById('shakeSensitivity').innerText = shakeThreshold;
        saveSettings();
    }

    function adjustVibration(delta) {
        vibrationIntensity = Math.max(0, vibrationIntensity + delta);
        document.getElementById('vibrationIntensity').innerText = vibrationIntensity;
        saveSettings();
    }

    function toggleArm() { state === "idle" ? enterArmedState() : disarm(); }

    async function enterArmedState() {
        state = "armed";
        document.getElementById('armBtn').innerText = "Disarm";
        setStatus("Arming (15s delay)...");
        
        // 15-second buffer before listeners attach
        setTimeout(async () => {
            if(state !== "armed") return;
            
            document.getElementById('blackScreen').style.display = "block";
            try { navigator.wakeLock.request('screen').then(w => wakeLock = w); } catch(e){}

            const granted = await requestMotionPermissions();
            if (!granted) { alert("Permission denied"); disarm(); return; }

            window.addEventListener('devicemotion', handleShake);
            window.addEventListener('deviceorientation', handleRotation);
            setStatus("Armed");
        }, 15000);
    }

    function triggerEvent(type) {
        if (state !== "armed") return;
        if (navigator.vibrate) navigator.vibrate(vibrationIntensity); 
        cleanupListeners();
        setStatus(type + " detected: calling...");
        const seconds = (type === 'rotation') ? rotationSeconds : shakeSeconds;
        timerRef = setTimeout(showFakeCall, seconds * 1000);
    }

    function showFakeCall() {
        document.getElementById('fakeCall').style.display = "block";
        document.getElementById('blackScreen').style.display = "none";
        const r = document.getElementById('ringtone');
        r.play().catch(() => {});
    }

    function disarm() {
        state = "idle";
        cleanupListeners();
        document.getElementById('app').style.display = "block";
        document.getElementById('blackScreen').style.display = "none";
        document.getElementById('disarmOverlay').style.display = "none";
        document.getElementById('fakeCall').style.display = "none";
        document.getElementById('armBtn').innerText = "Arm";
        const r = document.getElementById('ringtone');
        r.pause(); r.currentTime = 0;
        setStatus("Idle");
    }

    function cleanupListeners() {
        window.removeEventListener('devicemotion', handleShake);
        window.removeEventListener('deviceorientation', handleRotation);
        if (timerRef) clearTimeout(timerRef);
        if (wakeLock) { wakeLock.release().then(() => wakeLock = null); }
    }

    function handleRotation(event) {
        if (state !== "armed" || event.beta == null) return;
        if (lastOrientation === null) { lastOrientation = event.beta; return; }
        const diff = Math.abs(event.beta - lastOrientation);
        lastOrientation = event.beta;
        if (diff >= rotationThreshold && diff < 180) triggerEvent('rotation');
    }

    function handleShake(event) {
        if (state !== "armed") return;
        const acc = event.accelerationIncludingGravity;
        if (!acc) return;
        const magnitude = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
        if (Math.abs(magnitude - 9.8) > shakeThreshold) triggerEvent('shake');
    }

    async function requestMotionPermissions() {
        if (typeof DeviceMotionEvent.requestPermission === "function") {
            try { return (await DeviceMotionEvent.requestPermission() === "granted"); }
            catch(e) { return false; }
        }
        return true;
    }

    document.addEventListener('click', (e) => {
        if (document.getElementById('blackScreen').style.display === "block") {
            document.getElementById('disarmOverlay').style.display = "flex";
        }
    });
</script>
</body>
</html>
