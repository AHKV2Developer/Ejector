<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8" />
<title>Trigger Call App</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    background: #000;
    color: #fff;
    font-family: Arial, sans-serif;
    height: 100%;
    overflow: hidden;
}
#app { padding: 20px; }
.section { margin-bottom: 20px; }
.controls { display: flex; align-items: center; gap: 10px; }
button { padding: 10px 20px; font-size: 18px; }

#blackScreen {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000; display: none; z-index: 50;
}
 = null;
let rotationTimer = null;
let shakeTimer = null;

let rotationSeconds = 5;
let shakeSeconds = 5;

let rotationThreshold = 45;
let shakeThreshold = 15;

let lastOrientation = null;

function adjustTimer(type, delta) {
    if (type === 'rotation') {
        rotationSeconds = Math.max(0, rotationSeconds + delta);
        document.getElementById('rotationTime').innerText = rotationSeconds;
    } else {
        shakeSeconds = Math.max(0, shakeSeconds + delta);
        document.getElementById('shakeTime').innerText = shakeSeconds;
    }
}

function toggleArm() {
    if (state === "idle") startArming();
    else if (state === "arming") disarm();
}

function startArming() {
    state = "arming";
    document.getElementById('armBtn').innerText = "Disarm";

    armingTimeout = setTimeout(() => {
        enterArmedState();
    }, 5000);
}

function enterArmedState() {
    state = "armed";
    document.getElementById('app').style.display = "none";
    document.getElementById('blackScreen').style.display = "block";

    requestMotionPermissions().then(() => {
        window.addEventListener('devicemotion', handleShake);
        window.addEventListener('deviceorientation', handleRotation);
    });
}

async function requestMotionPermissions() {
    if (typeof DeviceMotionEvent.requestPermission === "function") {
        try {
            let r1 = await DeviceMotionEvent.requestPermission();
            let r2 = await DeviceOrientationEvent.requestPermission();
            return (r1 === "granted" && r2 === "granted");
        } catch (e) {
            console.log("Permission error:", e);
        }
    }
    return true; // Android usually doesn't need permission
}

function disarm() {
    state = "idle";
    clearTimeout(armingTimeout);
    clearInterval(rotationTimer);
    clearInterval(shakeTimer);

    window.removeEventListener('devicemotion', handleShake);
    window.removeEventListener('deviceorientation', handleRotation);

    document.getElementById('app').style.display = "block";
    document.getElementById('blackScreen').style.display = "none";
    document.getElementById('disarmOverlay').style.display = "none";
    document.getElementById('armBtn').innerText = "Arm";
}

function handleRotation(event) {
    if (lastOrientation === null) lastOrientation = event.beta;

    let diff = Math.abs(event.beta - lastOrientation);

    if (diff >= rotationThreshold) {
        triggerRotation();
        window.removeEventListener('deviceorientation', handleRotation);
    }
}

function handleShake(event) {
    let acc = event.accelerationIncludingGravity;
    if (!acc) return;

    let magnitude = Math.sqrt(
        acc.x * acc.x +
        acc.y * acc.y +
        acc.z * acc.z
    );

    if (magnitude > shakeThreshold) {
        triggerShake();
        window.removeEventListener('devicemotion', handleShake);
    }
}

function triggerRotation() {
    navigator.vibrate(100);
    startTimer('rotation');
}

function triggerShake() {
    navigator.vibrate(100);
    startTimer('shake');
}

function startTimer(type) {
    let seconds = type === 'rotation' ? rotationSeconds : shakeSeconds;

    let timer = setTimeout(() => {
        showFakeCall();
    }, seconds * 1000);

    if (type === 'rotation') rotationTimer = timer;
    else shakeTimer = timer;
}

function simulateRotation() { triggerRotation(); }
function simulateShake() { triggerShake(); }

function showFakeCall() {
    document.getElementById('fakeCall').style.display = "block";
    document.getElementById('blackScreen').style.display = "none";
    document.getElementById('disarmOverlay').style.display = "none";
    document.getElementById('ringtone').play();
}

function stopFakeCall() {
    document.getElementById('fakeCall').style.display = "none";
    let r = document.getElementById('ringtone');
    r.pause();
    r.currentTime = 0;
    disarm();
}

document.addEventListener('visibilitychange', () => {
    if (state === "armed" && !document.hidden) {
        document.getElementById('disarmOverlay').style.display = "flex";
    }
});
</script>

</body>
</html>
