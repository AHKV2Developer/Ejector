<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactile Precision Lab</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .control-panel { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; width: 320px; }
        .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .label-box { flex-grow: 1; }
        .val-display { font-size: 20px; color: #fff; font-weight: bold; }
        .btn-group { display: flex; gap: 10px; }
        .adj-btn { background: #333; color: white; border: 1px solid #555; width: 45px; height: 45px; border-radius: 5px; font-size: 24px; cursor: pointer; }
        .adj-btn:active { background: #555; }
        .main-btn { width: 100%; padding: 20px; margin-top: 10px; border-radius: 8px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; }
        .pulse-btn { background: #0055ff; color: white; }
        .loop-btn { background: #222; color: #888; border: 1px solid #444; }
        .loop-active { background: #aa0000; color: white; border-color: #ff0000; }
        .init-btn { background: #fff; color: #000; margin-bottom: 20px; }
        .desc { font-size: 11px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>

    <button class="main-btn init-btn" id="initBtn" onclick="initAudio()">INITIALIZE SYSTEM</button>

    <div class="control-panel">
        <!-- Frequency Control -->
        <div class="row">
            <div class="label-box">
                <div>FREQ (Hz)</div>
                <div class="desc">Lower = stealthier</div>
            </div>
            <div class="val-display" id="freqV">40</div>
            <div class="btn-group">
                <button class="adj-btn" onclick="adj('freq', -5)">-</button>
                <button class="adj-btn" onclick="adj('freq', 5)">+</button>
            </div>
        </div>

        <!-- Duration Control -->
        <div class="row">
            <div class="label-box">
                <div>DUR (ms)</div>
                <div class="desc">Length of thump</div>
            </div>
            <div class="val-display" id="durV">300</div>
            <div class="btn-group">
                <button class="adj-btn" onclick="adj('dur', -50)">-</button>
                <button class="adj-btn" onclick="adj('dur', 50)">+</button>
            </div>
        </div>

        <!-- Attack Control -->
        <div class="row">
            <div class="label-box">
                <div>ATTACK (ms)</div>
                <div class="desc">Lower = sharper</div>
            </div>
            <div class="val-display" id="attV">20</div>
            <div class="btn-group">
                <button class="adj-btn" onclick="adj('att', -5)">-</button>
                <button class="adj-btn" onclick="adj('att', 5)">+</button>
            </div>
        </div>

        <button class="main-btn pulse-btn" onclick="pulse()">TEST PULSE</button>
        <button class="main-btn loop-btn" id="loopBtn" onclick="toggleLoop()">LOOP: OFF</button>
    </div>

    <script>
        let audioCtx, loopID;
        let config = { freq: 40, dur: 300, att: 20 };

        function adj(key, delta) {
            config[key] += delta;
            // Boundaries
            if (config.freq < 20) config.freq = 20;
            if (config.dur < 50) config.dur = 50;
            if (config.att < 1) config.att = 1;
            if (config.att > config.dur) config.att = config.dur;
            
            document.getElementById(key + 'V').innerText = config[key];
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('initBtn').style.display = 'none';
        }

        function pulse() {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(config.freq, audioCtx.currentTime);

            // Convert ms to seconds for Web Audio API
            const d = config.dur / 1000;
            const a = config.att / 1000;

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + a);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + d);
        }

        function toggleLoop() {
            const btn = document.getElementById('loopBtn');
            if (loopID) {
                clearInterval(loopID);
                loopID = null;
                btn.innerText = "LOOP: OFF";
                btn.classList.remove('loop-active');
            } else {
                pulse();
                loopID = setInterval(pulse, 1000);
                btn.innerText = "LOOP: ON";
                btn.classList.add('loop-active');
            }
        }
    </script>
</body>
</html>
