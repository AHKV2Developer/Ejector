<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactile Precision Lab</title>
    <style>
        /* Ensuring nothing bleeds off screen */
        * { box-sizing: border-box; }
        body { 
            background: #000; 
            color: #0f0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 10px;
            margin: 0;
            overflow-x: hidden;
        }
        .control-panel { 
            background: #111; 
            border: 1px solid #333; 
            padding: 15px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 350px; 
        }
        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            border-bottom: 1px solid #222; 
            padding-bottom: 10px; 
        }
        .label-box { flex: 1; padding-right: 5px; }
        .label-text { font-size: 14px; font-weight: bold; color: #0f0; }
        .val-display { font-size: 22px; color: #fff; font-weight: bold; min-width: 60px; text-align: center; }
        .btn-group { display: flex; gap: 8px; }
        .adj-btn { 
            background: #333; 
            color: white; 
            border: 1px solid #555; 
            width: 44px; 
            height: 44px; 
            border-radius: 8px; 
            font-size: 20px; 
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .adj-btn:active { background: #555; }
        .main-btn { 
            width: 100%; 
            padding: 18px; 
            margin-top: 10px; 
            border-radius: 10px; 
            border: none; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer; 
        }
        .pulse-btn { background: #0055ff; color: white; }
        .loop-btn { background: #222; color: #888; border: 1px solid #444; }
        .loop-active { background: #aa0000; color: white; border-color: #ff0000; }
        .init-btn { background: #fff; color: #000; margin-bottom: 15px; z-index: 100; }
        .desc { font-size: 11px; color: #666; margin-top: 2px; line-height: 1.2; }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">Tactile Lab v3.1</h2>
    
    <button class="main-btn init-btn" id="initBtn" onclick="initAudio()">STEP 1: INITIALIZE AUDIO</button>

    <div class="control-panel">
        <div class="row">
            <div class="label-box">
                <div class="label-text">FREQ (Hz)</div>
                <div class="desc">Try 30-50Hz</div>
            </div>
            <div class="val-display" id="freqV">40</div>
            <div class="btn-group">
                <button class="adj-btn" onclick="adj('freq', -5)">-</button>
                <button class="adj-btn" onclick="adj('freq', 5)">+</button>
            </div>
        </div>

        <div class="row">
            <div class="label-box">
                <div class="label-text">DUR (ms)</div>
                <div class="desc">Thump length</div>
            </div>
            <div class="val-display" id="durV">300</div>
            <div class="btn-group">
                <button class="adj-btn" onclick="adj('dur', -50)">-</button>
                <button class="adj-btn" onclick="adj('dur', 50)">+</button>
            </div>
        </div>

        <div class="row" style="border:none;">
            <div class="label-box">
                <div class="label-text">ATTACK (ms)</div>
                <div class="desc">Sharpness</div>
            </div>
            <div class="val-display" id="attV">20</div>
            <div class="btn-group">
                <button class="adj-btn" onclick="adj('att', -5)">-</button>
                <button class="adj-btn" onclick="adj('att', 5)">+</button>
            </div>
        </div>

        <button class="main-btn pulse-btn" onclick="pulse()">TEST PULSE</button>
        <button class="main-btn loop-btn" id="loopBtn" onclick="toggleLoop()">LOOP: OFF</button>
    </div>

    <script>
        let audioCtx, loopID;
        let config = { freq: 40, dur: 300, att: 20 };

        function adj(key, delta) {
            config[key] += delta;
            if (config.freq < 20) config.freq = 20;
            if (config.dur < 50) config.dur = 50;
            if (config.att < 1) config.att = 1;
            if (config.att > config.dur) config.att = config.dur;
            document.getElementById(key + 'V').innerText = config[key];
        }

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('initBtn').style.opacity = '0.3';
            document.getElementById('initBtn').innerText = 'AUDIO SYSTEM READY';
        }

        function pulse() {
            if (!audioCtx) {
                alert("Tap INITIALIZE first!");
                return;
            }
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(config.freq, audioCtx.currentTime);

            const d = config.dur / 1000;
            const a = config.att / 1000;

            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(1, audioCtx.currentTime + a);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + d);
        }

        function toggleLoop() {
            const btn = document.getElementById('loopBtn');
            if (loopID) {
                clearInterval(loopID);
                loopID = null;
                btn.innerText = "LOOP: OFF";
                btn.classList.remove('loop-active');
            } else {
                if (!audioCtx) { alert("Tap INITIALIZE first!"); return; }
                pulse();
                loopID = setInterval(pulse, 1000);
                btn.innerText = "LOOP: ON";
                btn.classList.add('loop-active');
            }
        }
    </script>
</body>
</html>
